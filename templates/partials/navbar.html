<!-- Shared Navbar Partial – requires `user` in template context -->
<nav class="navbar">
    <div class="nav-container">

        <a href="/" class="logo" id="logo-link">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="GreenAcres" style="height:36px; width:36px; border-radius:50%; object-fit:cover;">
            <span class="logo-text">GreenAcres</span>
        </a>



        <ul class="nav-icons">
            <li id="nav-home" title="Home" onclick="window.location='/'">
                <i class="fa-solid fa-house"></i>
                <span class="nav-label">Home</span>
            </li>
            <li id="nav-network" title="Network" onclick="window.location='/network'">
                <i class="fa-solid fa-user-group"></i>
                <span class="nav-label">Network</span>
            </li>
            <li id="nav-market" title="Market" onclick="window.location='/market'">
                <i class="fa-solid fa-store"></i>
                <span class="nav-label">Market</span>
            </li>

            <li id="nav-inbox" title="Inbox" onclick="window.location='/inbox'">
                <i class="fa-solid fa-inbox"></i>
                <span class="nav-label">Inbox</span>
            </li>
        </ul>

        <!-- Profile area with dropdown -->
        <div class="profile-menu" id="profile-menu" onclick="toggleProfileDropdown(event)">
            <img src="{{ user.avatar_url }}" alt="Profile" class="nav-avatar">
            <span class="profile-text">{{ user.full_name.split()[0] if user.full_name else 'Profile' }}</span>
            <i class="fa-solid fa-chevron-down profile-chevron"></i>

            <div class="profile-dropdown" id="profile-dropdown">
                <div class="dropdown-header">
                    <p>{{ user.full_name }}</p>
                    <small>{{ user.email if user.email else user.username }}</small>
                </div>

                <a href="/profile/{{ user.id }}" class="dropdown-item">
                    <i class="fa-solid fa-user"></i> View Profile
                </a>
                <a href="#" class="dropdown-item">
                    <i class="fa-solid fa-gear"></i> Settings
                </a>
                <a href="#" class="dropdown-item danger" id="logout-btn" onclick="logout(); return false;">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </a>
                <hr style="border:none; border-top:1px solid #e2e8f0; margin:5px 0;">
                <a href="#" class="dropdown-item" style="color:#ef4444; font-size:12px;" onclick="deleteAccount(); return false;">
                    <i class="fa-solid fa-trash"></i> Delete Account
                </a>
            </div>
        </div>

    </div>
</nav>

<!-- Clerk JS SDK CDN -->
<script async crossorigin="anonymous" data-clerk-publishable-key="{{ clerk_publishable_key }}" src="https://{{ clerk_frontend_api }}/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" type="text/javascript"></script>

<script>
    // Initialize Clerk and setup session sync
    window.addEventListener('load', async () => {
        if (typeof Clerk === 'undefined') {
            console.error("Clerk SDK failed to load.");
            return;
        }
        await Clerk.load();
        
        // Sync Clerk token with clerk_token cookie
        Clerk.addListener(({ session }) => {
            if (session) {
                Clerk.session.getToken().then(token => {
                    if (token) {
                        document.cookie = `clerk_token=${token}; path=/; max-age=86400; SameSite=Lax`;
                    }
                });
            } else {
                document.cookie = "clerk_token=; path=/; max-age=0; SameSite=Lax";
            }
        });
    });

    // Highlight active nav item based on current path
    (function () {
        const path = window.location.pathname;
        if (path === '/') document.getElementById('nav-home')?.classList.add('active');
        if (path === '/network') document.getElementById('nav-network')?.classList.add('active');
        if (path === '/market') document.getElementById('nav-market')?.classList.add('active');
        if (path === '/inbox') document.getElementById('nav-inbox')?.classList.add('active');
    })();

    function toggleProfileDropdown(e) {
        e.stopPropagation();
        document.getElementById('profile-dropdown').classList.toggle('open');
    }
    document.addEventListener('click', function () {
        document.getElementById('profile-dropdown')?.classList.remove('open');
    });
    async function logout() {
        if (typeof Clerk !== 'undefined') {
            await Clerk.signOut();
        }
        try {
            await fetch('/logout');
        } catch {}
        window.location.href = '/login';
    }
    async function deleteAccount() {
        if (confirm("Are you sure you want to delete your account? This action cannot be undone.")) {
            try {
                const resp = await fetch('/api/account/delete', { method: 'POST' });
                const data = await resp.json();
                if (data.success) {
                    alert('Account deleted successfully.');
                    window.location.href = '/login';
                } else {
                    alert('Failed to delete account.');
                }
            } catch {
                alert('Error deleting account.');
            }
        }
    }
</script>
