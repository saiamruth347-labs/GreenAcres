<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenAcres – Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    
    <!-- Clerk JS SDK CDN -->
    <script async crossorigin="anonymous" data-clerk-publishable-key="{{ clerk_publishable_key }}" src="https://{{ clerk_frontend_api }}/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" type="text/javascript"></script>
</head>
<body class="auth-body">
    <div class="auth-split">
        <!-- Left Side: Branding -->
        <div class="auth-brand">
            <div class="brand-inner">
                <div class="brand-logo">
                    <img src="/static/images/logo.png" alt="GreenAcres" style="height:50px; width:auto; margin-bottom:10px;" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="brand-text-fallback" style="display:flex; align-items:center; gap:10px;">
                        <img src="/static/images/logo.png" alt="GreenAcres" style="height:36px; width:36px; border-radius:50%; object-fit:cover;">
                        <span style="font-size:24px; font-weight:800; color:white;">GreenAcres</span>
                    </div>
                </div>
                <h1 class="brand-headline">Join India's Farmer Community</h1>
                <p class="brand-sub">Share updates, discover market listings, chat with other farmers, and grow your farming network – all in one place.</p>
                <ul class="brand-features">
                    <li><i class="fa-solid fa-check-circle"></i> Free to join</li>
                    <li><i class="fa-solid fa-check-circle"></i> Buy & Sell in the Market</li>
                    <li><i class="fa-solid fa-check-circle"></i> Connect with nearby farmers</li>
                    <li><i class="fa-solid fa-check-circle"></i> Get local weather updates</li>
                </ul>
            </div>
        </div>

        <!-- Right Side: Clerk Authentication -->
        <div class="auth-form-panel" style="display:flex; justify-content:center; align-items:center; background:#f8fafc;">
            <div id="clerk-sign-up"></div>
        </div>
    </div>

    <script>
        window.addEventListener('load', async () => {
            if (typeof Clerk === 'undefined') {
                console.error("Clerk SDK failed to load.");
                return;
            }
            await Clerk.load();

            // Setup listeners to write clerk_token cookie when authenticated
            Clerk.addListener(({ session }) => {
                if (session) {
                    Clerk.session.getToken().then(token => {
                        if (token) {
                            document.cookie = `clerk_token=${token}; path=/; max-age=86400; SameSite=Lax`;
                        }
                    });
                } else {
                    document.cookie = "clerk_token=; path=/; max-age=0; SameSite=Lax";
                }
            });

            // Redirect to home if already authenticated
            if (Clerk.user) {
                window.location.href = '/';
                return;
            }

            // Mount Clerk's pre-built SignUp UI component
            const signUpDiv = document.getElementById('clerk-sign-up');
            Clerk.mountSignUp(signUpDiv, {
                signInUrl: '/login',
                afterSignUpUrl: '/',
            });
        });
    </script>
</body>
</html>
